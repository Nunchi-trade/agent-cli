[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[deploy.volumes]]
mountPath = "/data"

[variables]
PORT = "8080"
HL_TESTNET = "true"
INTERNAL_GATEWAY_HOST = "127.0.0.1"
INTERNAL_GATEWAY_PORT = "18789"
OPENCLAW_ENTRY = "/openclaw/dist/entry.js"
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
NUNCHI_RELAY_URL = ""
NUNCHI_ACCOUNT_ID = ""
NUNCHI_AGENT_ID = ""
NUNCHI_BINDING_SESSION_ID = ""
NUNCHI_BINDING_CODE = ""
NUNCHI_BINDING_EXPIRES_AT_MS = ""
NUNCHI_TEMPLATE_VERSION = "openclaw-railway-v1"
